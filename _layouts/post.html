---
layout: default
---

<article>
  <h1>{{ page.title }}</h1>

  <time>{{ page.date }}</time>

  {{ content }}
</article>

<aside>
  <h2 id="other-reads">Other reads</h2>

  <nav aria-labelledby="other-reads">
    {% for post in site.posts %}
      {% if post.title != page.title %}
        <a href="{{ post.url }}">{{ post.title }}</a>
      {% endif %}
    {% endfor %}
  </nav>
</aside>
